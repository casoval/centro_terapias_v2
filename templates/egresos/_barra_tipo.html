{# egresos/_barra_tipo.html — barra de progreso para desglose de egresos por tipo #}
{% widthratio monto total 100 as porcentaje %}
<div>
    <div class="flex justify-between items-center mb-0.5">
        <span class="text-xs text-gray-600 font-medium">{{ label }}</span>
        <span class="text-xs font-bold text-gray-700">Bs. {{ monto|floatformat:0 }}
            <span class="text-gray-400 font-normal">({{ porcentaje }}%)</span>
        </span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-1.5">
        <div class="{{ color }} h-1.5 rounded-full transition-all" style="width: {{ porcentaje }}%"></div>
    </div>
</div>
